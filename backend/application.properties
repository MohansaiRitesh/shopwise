# Server - Render injects PORT automatically
server.port=${PORT:8080}

# Allow cross-origin requests from React frontend
spring.web.cors.allowed-origins=http://localhost:3000

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:shopwisedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Settings
#app.jwt.secret=${JWT_SECRET:ShopWiseSecretKey2024VeryLongAndSecureKeyForProductionUse}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# OAuth2 - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# OAuth2 - GitHub
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# Frontend URL (used for CORS + OAuth2 redirect)
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Logging
logging.level.com.shopwise=INFO
logging.level.org.springframework.security=INFO