# ===========================
# ShopWise Application Config
# ===========================

server.port=8080

# Allow cross-origin requests from the React frontend
spring.web.cors.allowed-origins=http://localhost:3000

# =====================
# H2 In-Memory Database
# =====================
spring.datasource.url=jdbc:h2:mem:shopwisedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============
# JPA / Hibernate
# ============
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============
# JWT Settings
# ============
# Secret key (min 256-bit for HS256); replace with a strong random value in production
app.jwt.secret=ShopWiseSecretKey2024VeryLongAndSecureKeyForProductionUse
app.jwt.expiration-ms=86400000

# ==========================================
# OAuth2 / OpenID Connect (SSO) Configuration
# ==========================================
# Google OAuth2 - Replace with your actual credentials from Google Cloud Console
# https://console.cloud.google.com/apis/credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# GitHub OAuth2 - Replace with your actual credentials from GitHub Developer Settings
# https://github.com/settings/applications/new
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:your-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:your-github-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# =======
# Logging
# =======
logging.level.com.shopwise=DEBUG
logging.level.org.springframework.security=INFO
